<!DOCTYPE html>
<html lang="es">
<head>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">
        <img src="img/logo2.png" alt="Logo">

        <a href="registro.html">Registro</a>

<footer>
