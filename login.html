<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - BS</title>
  <link rel="stylesheet" href="./Hojas de estilo/style.css">
  <link rel="icon" href="img/logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<header>
    <div class="logo">
        <a href="index.html" class="logomain">
            <img src="img/logo2.png" alt="mainlogobtn">
        </a>
    </div>
    <nav>
        <button id="themeToggle" class="theme-btn">
            <i class="fa-solid fa-moon"></i>
        </button>
        <a href="info.html">Acerca</a>
        <a href="index.html">Inicio</a>
        <a href="registro.html">Registro</a>

    </nav>
</header>

<main class="formulario">
    <div class="formlog">
        <h2>Iniciar Sesión</h2><br>
        <form class="forma">
            <h3>Ingresa tu correo</h3>
            <input type="email" placeholder="correo@gmail.com">

            <h3>Ingresa tu contraseña</h3>
            <input type="password" placeholder="Contraseña">

            <button>Ingresar</button>
        </form>
    </div>
</main>

<div class="info-login">
        <h3>¿No tienes una cuenta?</h3>
        <a href="registro.html" class="btn-reg">Regístrate aquí</a>
</div>

<div class="password">
        <a href="pass.html" class="btn-pass">¿Olvidaste tu contraseña?</a>
</div>

<footer>
    <p>© 2025 BlackSoft</p>
</footer>

<script src="script.js"></script>
</body>
</html>
